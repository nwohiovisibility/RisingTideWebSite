<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VISIBLE Heroes Caller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Visible Caller">
<link rel="apple-touch-icon" href="icon.png">

  <link rel="stylesheet" href="styles.css">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>

<body>
  <header>
    <img src="risingtide.png" class="app-logo" alt="Rising Tide Logo">
    <h1>VISIBLE Heroes Caller</h1>
  </header>

  <main>
    <div class="controls">
      <button id="drawBtn">Draw Hero</button>
      <button id="resetBtn" class="secondary">Reset</button>
      <div id="drawCounter">Draws: 0</div>
      <div id="totalHeroes">Total Heroes: …</div>
    </div>

    <div class="layout">
      <section class="current-card" id="currentCard">
        <div class="hero-name" id="heroName">Tap “Draw Hero” to begin</div>

        <!-- ⭐ Added Hero ID display -->
        <div class="hero-id">Hero ID: <span id="heroID"></span></div>

        <div class="hero-bio" id="heroBio">
          Each call shows a hero’s name, short bio, and visibility flags.
        </div>

        <div class="hero-flags-label">Flags</div>
        <div class="hero-flags" id="heroFlags"></div>
      </section>

      <section class="history">
        <h2>History</h2>
        <ul class="history-list" id="historyList"></ul>
      </section>
    </div>
  </main>

  <footer>
    VISIBLE Heroes • Shuffle, call, and celebrate all stories.
  </footer>

  <script src="caller.js"></script>
</body>
</html>
